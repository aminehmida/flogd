name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o "flogd-${{ matrix.goos }}-${{ matrix.goarch }}" .
      - name: Validate deb/rpm packaging
        if: matrix.goos == 'linux'
        run: |
          # Install nfpm for the host arch first (before exporting GOARCH,
          # which would otherwise cross-compile the tool for the target).
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          export GOARCH="${{ matrix.goarch }}" VERSION="0.0.0"
          envsubst '${GOARCH} ${VERSION}' < nfpm.yaml > /tmp/nfpm.yaml
          nfpm package --config /tmp/nfpm.yaml --packager deb --target /tmp/flogd.deb
          nfpm package --config /tmp/nfpm.yaml --packager rpm --target /tmp/flogd.rpm
      - uses: actions/upload-artifact@v4
        with:
          name: flogd-${{ matrix.goos }}-${{ matrix.goarch }}
          path: flogd-${{ matrix.goos }}-${{ matrix.goarch }}
