name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o "flogd-${{ matrix.goos }}-${{ matrix.goarch }}" .
      - name: Build deb and rpm packages
        if: matrix.goos == 'linux'
        env:
          GOARCH: ${{ matrix.goarch }}
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          export VERSION="${GITHUB_REF_NAME#v}"
          envsubst '${GOARCH} ${VERSION}' < nfpm.yaml > /tmp/nfpm.yaml
          nfpm package --config /tmp/nfpm.yaml --packager deb --target "flogd_${VERSION}_${GOARCH}.deb"
          nfpm package --config /tmp/nfpm.yaml --packager rpm --target "flogd_${VERSION}_${GOARCH}.rpm"
      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flogd-${{ matrix.goos }}-${{ matrix.goarch }}
            *.deb
            *.rpm
